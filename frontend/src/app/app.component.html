@if (authService.isLoggedIn()) {
  <div class="layout">
    <nav class="sidebar">
      <h2>TAP Terminal</h2>
      <p class="user-name">{{ authService.currentUser()?.name }}</p>

      <ul>
        @if (authService.hasAccess('products')) {
          <li><a routerLink="/productos" routerLinkActive="active">Productos</a></li>
        }
        @if (authService.hasAccess('users')) {
          <li><a routerLink="/usuarios" routerLinkActive="active">Usuarios</a></li>
        }
        @if (authService.hasAccess('profiles')) {
          <li><a routerLink="/perfiles" routerLinkActive="active">Perfiles</a></li>
        }
      </ul>

      <button class="logout-btn" (click)="authService.logout()">Cerrar sesión</button>
    </nav>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}
