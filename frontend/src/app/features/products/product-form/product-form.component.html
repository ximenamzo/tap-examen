<div class="form-container">
  <h1>{{ isEditMode() ? 'Editar producto' : 'Nuevo producto' }}</h1>

  @if (errorMessage()) {
    <div class="error-message">{{ errorMessage() }}</div>
  }

  <form (ngSubmit)="onSubmit()">
    <label>Nombre</label>
    <input type="text" name="name" [(ngModel)]="name" required maxlength="255" />

    <label>Marca</label>
    <input type="text" name="brand" [(ngModel)]="brand" required maxlength="255" />

    <label>Precio (máx. 3 dígitos)</label>
    <input type="number" name="price" [(ngModel)]="price" required max="999" min="0" />

    <div class="form-actions">
      <button type="button" routerLink="/productos">Cancelar</button>
      <button type="submit" class="btn-primary">Guardar</button>
    </div>
  </form>
</div>
