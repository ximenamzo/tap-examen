<div class="form-container">
  <h1>Cambiar contraseña</h1>

  @if (errorMessage()) {
    <div class="error-message">{{ errorMessage() }}</div>
  }
  @if (successMessage()) {
    <div class="success-message">{{ successMessage() }}</div>
  }

  <form (ngSubmit)="onSubmit()" #pwForm="ngForm">
    <label>Contraseña actual</label>
    <input type="password" name="currentPassword" [(ngModel)]="currentPassword" required />

    <label>Contraseña nueva</label>
    <input
      type="password"
      name="newPassword"
      [(ngModel)]="newPassword"
      required
      [pattern]="passwordPattern"
      #newPasswordModel="ngModel"
    />
    @if (newPasswordModel.invalid && newPasswordModel.touched) {
      <span class="field-error">
        Debe tener mínimo 8 caracteres, mayúscula, minúscula, número y símbolo.
      </span>
    }

    <label>Confirmar contraseña nueva</label>
    <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required />

    <div class="form-actions">
      <button type="button" routerLink="/dashboard">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="pwForm.invalid">Guardar</button>
    </div>
  </form>
</div>
