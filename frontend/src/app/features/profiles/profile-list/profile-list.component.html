<div class="page-header">
  <h1>Perfiles</h1>
  <div class="header-actions">
    <button (click)="onExportPdf()" class="btn-secondary" title="Descargar PDF">⬇️📄 PDF</button>
    <button (click)="onExportExcel()" class="btn-secondary" title="Descargar Excel">⬇️📊 Excel</button>
    <button [routerLink]="['/perfiles/nuevo']" class="btn-primary" title="Nuevo perfil">+ Nuevo perfil</button>
  </div>
</div>

@if (loading()) {
  <p>Cargando...</p>
} @else {
  <table class="data-table">
    <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Acciones</th>
        <th>Fecha de creación</th>
      </tr>
    </thead>
    <tbody>
      @for (profile of profiles(); track profile.id) {
        <tr>
          <td>{{ profile.code }}</td>
          <td>{{ profile.name }}</td>
          <td class="actions">
            <button [routerLink]="['/perfiles', profile.id, 'editar']" [queryParams]="{ view: true }" title="Ver (detalle en modal)">👁</button>
            <button [routerLink]="['/perfiles', profile.id, 'editar']" title="Editar">✎</button>
            <button (click)="onDelete(profile.id)" title="Eliminar">🗑</button>
          </td>
          <td>{{ formatDate(profile.created_at) }}</td>
        </tr>
      } @empty {
        <tr><td colspan="3">No hay perfiles registrados.</td></tr>
      }
    </tbody>
  </table>
}
